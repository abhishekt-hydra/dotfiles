# tmux config managed by dotfiles.

# Plugins (TPM bootstraps itself near the end of this file).
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tpm'

# Dracula/window colors.
set -g @dracula-window-status-fg '#959591'
set -g @dracula-window-status-bg '#292b36'
set -g @dracula-window-status-current-fg '#f8f8f2'
set -g @dracula-window-status-current-bg '#44475a'
set -g @dracula-show-powerline false
set -g @dracula-show-left-icon session
set -g @dracula-plugins "cpu-usage ram-usage network-bandwidth custom:disk_space.sh time battery"
set -g @dracula-custom-plugin-colors "dark_gray orange"
set -g @dracula-show-location false
set -g @dracula-border-contrast true
set -g @dracula-synchronize-panes-label "Sync"
set -g @dracula-network-bandwidth-show-interface true
set -g @dracula-battery-label ""
set -g @dracula-battery-colors "gray orange"
set -g @dracula-cpu-usage-colors "dark_gray orange"
set -g @dracula-ram-usage-colors "dark_gray orange"
set -g @dracula-time-colors "dark_gray orange"
set -g @dracula-git-colors "dark_gray green"
set -g @dracula-military-time true
set -g @dracula-time-format "%H:%M:%S"

# Continuum settings.
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Basics.
set -g mouse on
set -g status on
set -g history-limit 50000
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
set -g repeat-time 500
set -s escape-time 0
set -g default-terminal "tmux-256color"
set-option -g xterm-keys on
set-window-option -g xterm-keys on
set -ga terminal-overrides ",xterm-ghostty:RGB"
set -ga terminal-overrides ",*256col*:Tc"

# Amp/modern terminal compatibility.
set -g allow-passthrough all
set -ga terminal-features ",*:hyperlinks"
set -s set-clipboard on
set -s extended-keys on
set -g extended-keys-format csi-u
bind -n S-Enter send-keys -l "\x1b[13;2u"

# Pane borders.
set -g pane-border-style 'fg=#44475a,bg=default'
set -g pane-active-border-style 'fg=#50fa7b,bg=default,bold'
set -g pane-border-lines heavy

# Pane/window bindings.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind r command-prompt "rename-session %%"
bind-key R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."

# Alt-arrow pane navigation.
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Pane synchronization.
bind C-Y setw synchronize-panes
setw -g window-status-current-format '#{?pane_synchronized,#[bg=red],}#I:#W'
setw -g window-status-format         '#{?pane_synchronized,#[bg=red],}#I:#W'

# Clipboard integration: macOS first, then Wayland, then X11.
if-shell 'command -v pbcopy >/dev/null 2>&1' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"; bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"; bind-key p run "pbpaste | tmux load-buffer - ; tmux paste-buffer"' \
  'if-shell "command -v wl-copy >/dev/null 2>&1" "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \"wl-copy\"; bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel \"wl-copy\"; bind-key p run \"wl-paste | tmux load-buffer - ; tmux paste-buffer\"" "if-shell \"command -v xclip >/dev/null 2>&1\" \"bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \\\"xclip -selection clipboard -i\\\"; bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel \\\"xclip -selection clipboard -i\\\"; bind-key p run \\\"xclip -selection clipboard -o | tmux load-buffer - ; tmux paste-buffer\\\"\""'

# Status bar.
set -g status-style bg=default,fg=white
set -g status-left ""
set -g status-right "#[fg=blue]%H:%M #[fg=white]%d-%b"
set -g status-interval 2
set -g @scroll-speed-num-lines-per-scroll 3

# Auto-detect primary Linux network interface for Dracula when `ip` exists.
if-shell 'command -v ip >/dev/null 2>&1' \
  'run-shell "tmux set-option -g @dracula-network-bandwidth \"$(ip -4 route ls | grep default | awk '\''{print $5}'\'')\""'

# Install TPM if missing, then load it. Must remain last.
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
